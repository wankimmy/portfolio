#:schema https://developers.openai.com/codex/config-schema.json

# BosskuAI Codex baseline
#
# Keep this project-local config lightweight and portable.
# Add personal MCP servers or machine-specific tooling in ~/.codex/config.toml.

# Model assignment:
# - Planning phase: gpt-5.4 (high reasoning effort) via planner agent
# - Execution phase: gpt-5.4-mini (fast, capable for concrete implementation)
model = "gpt-5.4-mini"

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only evidence gathering before implementation or review."
config_file = "agents/explorer.toml"

[agents.planner]
description = "Implementation planner for complex features, refactors, and migrations."
config_file = "agents/planner.toml"

[agents.reviewer]
description = "Read-only reviewer focused on correctness, regressions, security, and tests."
config_file = "agents/reviewer.toml"

[agents.security_reviewer]
description = "Read-only security reviewer for trust boundaries, auth, secrets, and misuse paths."
config_file = "agents/security-reviewer.toml"

[agents.docs_researcher]
description = "Read-only documentation verifier for APIs, frameworks, and release-sensitive claims."
config_file = "agents/docs-researcher.toml"

[agents.tdd_guide]
description = "Read-only TDD guide for test-first planning, coverage gaps, and edge cases."
config_file = "agents/tdd-guide.toml"

